name: ${SERVICE_NAME}

services:
  boot:
    image: alpine:latest
    user: "0:0"
    volumes:
      - ./www:/var/www/html
    command: chown -R 1000:1000 /var/www/html
    networks:
      - wpnet

  wordpress:
    image: wordpress:php8.4-fpm
    restart: unless-stopped
    user: "1000:1000"
    volumes:
      - ./www:/var/www/html
      - ./php/uploads.ini:/usr/local/etc/php/conf.d/uploads.ini
      # - ./php/slowlog.conf:/usr/local/etc/php-fpm.d/z-slowlog.conf:ro # Useful for debugging slow websites
    environment:
      WORDPRESS_DB_HOST: ${WORDPRESS_DB_HOST}
      WORDPRESS_DB_USER: ${WORDPRESS_DB_USER}
      WORDPRESS_DB_PASSWORD: ${WORDPRESS_DB_PASSWORD}
      WORDPRESS_DB_NAME: ${WORDPRESS_DB_NAME}
      WORDPRESS_DEBUG: ${WORDPRESS_DEBUG}
      WORDPRESS_CONFIG_EXTRA: |
        define('WP_DEBUG_LOG', ${WORDPRESS_DEBUG_LOG});
        define('WP_DEBUG_DISPLAY', ${WORDPRESS_DEBUG_DISPLAY});
        define('DISABLE_WP_CRON', ${WORDPRESS_DISABLE_CRON});
        define('WP_HOME', '${WEBSITE_URL}');
        define('WP_SITEURL', '${WEBSITE_URL}');
    depends_on:
      boot:
        condition: service_completed_successfully
      mariadb:
        condition: service_started
    networks:
      - wpnet

  mariadb:
    image: mariadb:latest
    restart: unless-stopped
    volumes:
      - ./database/data:/var/lib/mysql
      - ./database/init:/docker-entrypoint-initdb.d
    environment:
      MARIADB_ROOT_PASSWORD: ${WORDPRESS_DB_PASSWORD}
      MYSQL_DATABASE: ${WORDPRESS_DB_NAME}
    networks:
      - wpnet

  server:
    image: nginx:latest
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
      - ./www:/var/www/html
    cap_add:
      - NET_ADMIN
    networks:
      - wpnet
    depends_on:
      wordpress:
        condition: service_started

networks:
  wpnet:
    driver: bridge
