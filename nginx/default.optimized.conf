# ----------------------------------------------------------------------
# HTTP Context
# ----------------------------------------------------------------------

gzip on;
gzip_comp_level 5;
gzip_min_length 1024;
gzip_proxied any;
gzip_vary on;

gzip_types
    text/plain
    text/css
    text/xml
    application/json
    application/javascript
    application/xml
    application/rss+xml
    application/atom+xml
    image/svg+xml;

open_file_cache max=5000 inactive=30s;
open_file_cache_valid 60s;
open_file_cache_min_uses 2;
open_file_cache_errors on;

fastcgi_cache_path /var/cache/nginx
    levels=1:2
    keys_zone=WORDPRESS:100m
    inactive=60m
    max_size=2g;

fastcgi_cache_key "$scheme$request_method$host$request_uri";

server {

    listen 80 default_server;
    listen [::]:80 default_server;

    server_name _;

    root /var/www/html;
    index index.php index.html index.htm;

    client_max_body_size 128M;

    # ------------------------------------------------------------------
    # Security Headers
    # ------------------------------------------------------------------

    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # ------------------------------------------------------------------
    # FastCGI Cache Rules
    # ------------------------------------------------------------------

    set $skip_cache 0;

    if ($request_method = POST) {
        set $skip_cache 1;
    }

    if ($query_string != "") {
        set $skip_cache 1;
    }

    if ($request_uri ~* "^/wp-admin/|^/wp-login\.php|^/xmlrpc\.php|^/wp-cron\.php") {
        set $skip_cache 1;
    }

    if ($http_cookie ~* "wordpress_logged_in|wordpress_sec|comment_author|woocommerce_items_in_cart|woocommerce_cart_hash|wp-postpass") {
        set $skip_cache 1;
    }

    # ------------------------------------------------------------------
    # Main
    # ------------------------------------------------------------------

    location / {
        try_files $uri $uri/ /index.php?$args;
    }

    # ------------------------------------------------------------------
    # PHP
    # ------------------------------------------------------------------

    location ~ \.php$ {

        location ~* /uploads/.*\.php$ {
            deny all;
        }

        fastcgi_split_path_info ^(.+\.php)(/.+)$;

        include fastcgi_params;

        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_param PATH_INFO $fastcgi_path_info;

        fastcgi_pass wordpress:9000;
        fastcgi_index index.php;

        fastcgi_connect_timeout 300;
        fastcgi_send_timeout 300;
        fastcgi_read_timeout 300;

        fastcgi_buffers 16 16k;
        fastcgi_buffer_size 32k;

        fastcgi_cache WORDPRESS;

        fastcgi_cache_valid 200 301 302 10m;
        fastcgi_cache_valid 404 1m;

        fastcgi_cache_use_stale
            error
            timeout
            invalid_header
            updating
            http_500
            http_503;

        fastcgi_cache_bypass $skip_cache;
        fastcgi_no_cache $skip_cache;

        add_header X-FastCGI-Cache $upstream_cache_status;
    }

    # ------------------------------------------------------------------
    # Static Assets
    # ------------------------------------------------------------------

    location ~* \.(css|js)$ {
        expires 30d;
        access_log off;
        log_not_found off;
        add_header Cache-Control "public, immutable";
    }

    location ~* \.(jpg|jpeg|gif|png|svg|ico|webp|avif|bmp|woff|woff2|ttf|eot|otf)$ {
        expires 365d;
        access_log off;
        log_not_found off;
        add_header Cache-Control "public, immutable";
    }

    # ------------------------------------------------------------------
    # Hidden Files
    # ------------------------------------------------------------------

    location ~ /\.(?!well-known).* {
        deny all;
    }

    # ------------------------------------------------------------------
    # Block sensitive files
    # ------------------------------------------------------------------

    location ~* /(readme|license)\.(txt|html)$ {
        deny all;
    }

    # Opcional
    # location = /xmlrpc.php {
    #     deny all;
    # }
}